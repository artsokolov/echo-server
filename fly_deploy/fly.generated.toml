app = "anri-puankar-gmail-com-harbour-compose"
primary_region = "fra"

[build.compose]
  file = "docker-compose.fly.yml"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
